name: FermentWatch
options:
  bundleIdPrefix: com.shimondeitel.ferment
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  FermentWatch:
    type: application
    platform: iOS
    sources:
      - path: FermentWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.ferment
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: FermentWatch/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  FermentWatchTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FermentWatchTests
      - path: FermentWatch.storekit
    dependencies:
      - target: FermentWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.ferment.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  FermentWatchUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FermentWatchUITests
    dependencies:
      - target: FermentWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.ferment.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  FermentWatch:
    build:
      targets:
        FermentWatch: all
        FermentWatchTests: [test]
        FermentWatchUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: FermentWatch.storekit
    test:
      config: Debug
      storeKitConfiguration: FermentWatch.storekit
      targets:
        - FermentWatchTests
        - FermentWatchUITests
    archive:
      config: Release
